services:
  postgres:
    image: postgres:16-alpine
    container_name: correio-inteligente-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-correio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-correio_inteligente}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
